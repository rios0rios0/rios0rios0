name: 'Update Stats'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level (info or debug)'
        required: false
        default: 'info'
        type: 'choice'
        options:
          - 'info'
          - 'debug'

jobs:
  update:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write

    steps:
      - name: 'Checkout main'
        uses: 'actions/checkout@v5'
        with:
          ref: 'main'
          fetch-depth: 0

      - name: 'Restore stats history'
        run: |
          git fetch origin stats:stats 2>/dev/null && git checkout stats -- stats_history.json 2>/dev/null || echo "No existing stats branch or history file found, starting fresh"

      - name: 'Set Up Go'
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.26.1'
          cache-dependency-path: 'go.sum'

      - name: 'Run Stats Generator (Daily)'
        env:
          RUN_MODE: 'daily'
          LOG_LEVEL: ${{ inputs.log_level || 'info' }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_ACCESS_TOKEN: ${{ secrets.GITLAB_ACCESS_TOKEN }}
          AZURE_DEVOPS_ORG: ${{ secrets.AZURE_DEVOPS_ORG }}
          AZURE_DEVOPS_ACCESS_TOKEN: ${{ secrets.AZURE_DEVOPS_ACCESS_TOKEN }}
        run: |
          go run main.go

      - name: 'Commit and Push to stats branch'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout --orphan stats-temp
          git reset
          git add stats_history.json combined_stats_*.svg contributions_*.svg top_languages_*.svg
          git add claude_tokens_final.svg 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit --message "chore(update): updated repository with latest stats"
          git push --force origin stats-temp:stats
