name: 'Update Stats'

on:
  push:
    branches: ['main']
  schedule:
    - cron: '0 0 * * *' # runs every day at midnight
  workflow_dispatch: # allows manual triggering of the workflow

jobs:
  update:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write

    steps:
      - name: 'Checkout stats branch'
        uses: 'actions/checkout@v5'
        with:
          ref: 'stats'
          fetch-depth: 1

      - name: 'Checkout main source code'
        uses: 'actions/checkout@v5'
        with:
          ref: 'main'
          path: 'src'

      - name: 'Set Up Go'
        uses: 'actions/setup-go@v5'
        with:
          go-version: '1.26.1'
          cache-dependency-path: 'src/go.sum'

      - name: 'Run Stats Generator'
        working-directory: 'src'
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_ACCESS_TOKEN: ${{ secrets.GITLAB_ACCESS_TOKEN }}
          AZURE_DEVOPS_ORG: ${{ secrets.AZURE_DEVOPS_ORG }}
          AZURE_DEVOPS_ACCESS_TOKEN: ${{ secrets.AZURE_DEVOPS_ACCESS_TOKEN }}
          STATS_HISTORY_PATH: ${{ github.workspace }}/stats_history.json
          SVG_OUTPUT_DIR: ${{ github.workspace }}
        run: |
          go run main.go

      - name: 'Commit and Push Changes'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add stats_history.json combined_stats_*.svg contributions_*.svg top_languages_*.svg claude_tokens_final.svg
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit --message "chore(update): updated repository with latest stats"
          git push origin stats
