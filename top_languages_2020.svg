<rect x="25" y="230" width="10" height="10" rx="2" fill="#238636"/><text x="39" y="239" class="legend-label">GitHub</text><rect x="93" y="230" width="10" height="10" rx="2" fill="#e24329"/><text x="107" y="239" class="legend-label">GitLab</text><rect x="161" y="230" width="10" height="10" rx="2" fill="#0078d4"/><text x="175" y="239" class="legend-label">Azure DevOps</text>
